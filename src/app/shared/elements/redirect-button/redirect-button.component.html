@if (external) {
  <a
    [href]="href"
    target="_blank"
    rel="noopener noreferrer"
    class="flex items-center space-x-2 px-2 py-1 border border-secondary-grey transition-all duration-200 hover:border-secondary-dark-grey cursor-pointer"
    >
    @if (icon) {
      <app-icon [name]="icon" [size]="size"></app-icon>
    }
    <span>{{ label }}</span>
  </a>
} @else {
  <a
    [routerLink]="href"
    [fragment]="fragment"
    class="flex items-center space-x-2 px-2 py-1 border border-secondary-grey transition-all duration-200 hover:border-secondary-dark-grey cursor-pointer"
    >
    @if (icon) {
      <app-icon [name]="icon" [size]="size"></app-icon>
    }
    <span>{{ label }}</span>
  </a>
}
